<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JKT48 Advanced Ticket Monitor</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: sans-serif; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <header class="mb-6 text-center md:text-left flex flex-col md:flex-row justify-between items-center border-b border-slate-700 pb-4">
            <div>
                <h1 class="text-3xl font-extrabold text-rose-500 tracking-wide">🔴 JKT48 EXCLUSIVE MONITOR</h1>
                <p class="text-slate-400 text-sm mt-1">Sistem Pemantau Otomatis Jalur Photocard & 2-Shot</p>
            </div>
            <div class="text-right mt-2 md:mt-0">
                <div id="statusFetch" class="text-xs font-bold text-emerald-400">🟢 Terhubung ke Repositori</div>
                <div id="lastUpdate" class="text-slate-400 text-xs mt-1">Memuat data dari server...</div>
            </div>
        </header>

        <section class="bg-slate-800 p-5 rounded-xl shadow-lg border border-slate-700 mb-6 space-y-4">
            
            <div>
                <label class="block text-xs font-bold uppercase tracking-wider text-rose-400 mb-2">Pilih Kategori Kebutuhan:</label>
                <div class="flex flex-wrap gap-2">
                    <button onclick="setJenisFilter('SEMUA')" id="btn-jns-SEMUA" class="px-4 py-2 rounded-lg text-sm font-bold bg-rose-600 text-white cursor-pointer transition">
                        ⭐ Semua Benefit
                    </button>
                    <button onclick="setJenisFilter('Photocard')" id="btn-jns-Photocard" class="px-4 py-2 rounded-lg text-sm font-semibold bg-slate-700 hover:bg-slate-600 text-slate-200 cursor-pointer transition">
                        📸 Photocard Only
                    </button>
                    <button onclick="setJenisFilter('2-Shot')" id="btn-jns-2-Shot" class="px-4 py-2 rounded-lg text-sm font-semibold bg-slate-700 hover:bg-slate-600 text-slate-200 cursor-pointer transition">
                        🤝 2-Shot Only
                    </button>
                </div>
            </div>

            <div>
                <label class="block text-xs font-bold uppercase tracking-wider text-sky-400 mb-2">Saring Berdasarkan Event & Lokasi:</label>
                <div class="flex flex-wrap gap-2">
                    <button onclick="setEventFilter('SEMUA')" id="btn-evt-SEMUA" class="px-4 py-1.5 rounded-md text-xs font-bold bg-sky-600 text-white cursor-pointer transition">
                        Semua Event
                    </button>
                    <button onclick="setEventFilter('LOVE & DREAM (SBY)')" id="btn-evt-LOVE & DREAM (SBY)" class="px-4 py-1.5 rounded-md text-xs font-semibold bg-slate-700 hover:bg-slate-600 text-slate-300 cursor-pointer transition">
                        LOVE & DREAM (Surabaya)
                    </button>
                    <button onclick="setEventFilter('PASSION (YOGYA)')" id="btn-evt-PASSION (YOGYA)" class="px-4 py-1.5 rounded-md text-xs font-semibold bg-slate-700 hover:bg-slate-600 text-slate-300 cursor-pointer transition">
                        PASSION (Yogyakarta)
                    </button>
                </div>
            </div>

            <div class="pt-2 border-t border-slate-700/50 flex flex-col sm:flex-row gap-3 justify-between items-center">
                <div class="w-full sm:w-auto">
                    <input type="text" id="searchFilter" oninput="filterData()" placeholder="Cari nama member atau oshi Anda..." class="bg-slate-900 border border-slate-600 rounded-lg px-4 py-2 text-sm w-full sm:w-80 focus:outline-none focus:border-rose-500 text-white">
                </div>
                <button onclick="bacaDataLokal()" class="w-full sm:w-auto text-xs bg-slate-700 hover:bg-slate-600 text-slate-300 px-4 py-2.5 rounded-lg transition cursor-pointer font-medium">
                    🔄 Refresh Tampilan Tabel
                </button>
            </div>
        </section>

        <main>
            <div class="overflow-x-auto bg-slate-800 rounded-xl shadow-lg border border-slate-700">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-slate-700/50 text-slate-300 text-xs font-bold uppercase tracking-wider border-b border-slate-700">
                            <th class="p-4">Event / Lokasi</th>
                            <th class="p-4">Kategori</th>
                            <th class="p-4">Sesi</th>
                            <th class="p-4 text-rose-300">Nama Member</th>
                            <th class="p-4 text-center">Terjual</th>
                            <th class="p-4 text-center">Sisa Kuota</th>
                            <th class="p-4 text-center">Status</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody" class="text-sm divide-y divide-slate-700">
                        <tr>
                            <td colspan="7" class="p-8 text-center text-slate-400">Sedang menyinkronkan data kuota dari repositori...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <script>
        let semuaMasterData = [];
        let filterJenisAktif = 'SEMUA';
        let filterEventAktif = 'SEMUA';

        // Mengambil data dari berkas data.json lokal hasil generate server GitHub Actions
        async function bacaDataLokal() {
            const statusDiv = document.getElementById('statusFetch');
            try {
                // Trik cache-buster (?_cb=) digunakan agar browser selalu membaca data asli terbaru, bukan cache lamanya
                const response = await fetch('./data.json?_cb=' + new Date().getTime());
                if (!response.ok) throw new Error("Berkas data.json belum dibuat oleh server GitHub.");
                
                const dataJson = await response.json();
                semuaMasterData = dataJson.data || [];
                
                document.getElementById('lastUpdate').innerText = `Terakhir Sync JKT48: ${dataJson.last_updated || '-'}`;
                statusDiv.innerText = "🟢 Data Sinkron";
                statusDiv.className = "text-xs font-bold text-emerald-400";
                
                filterData();
            } catch (error) {
                statusDiv.innerText = "⚠️ Menunggu Server Generate";
                statusDiv.className = "text-xs font-bold text-amber-400";
                document.getElementById('tableBody').innerHTML = `
                    <tr>
                        <td colspan="7" class="p-8 text-center text-amber-300">
                            ${error.message}<br>
                            <span class="text-xs text-slate-400 block mt-1">Silakan picu manual di tab GitHub Actions atau tunggu bot melakukan cron job terjadwal.</span>
                        </td>
                    </tr>`;
            }
        }

        // Handler perubahan filter tombol Photocard / 2-Shot
        function setJenisFilter(jenis) {
            filterJenisAktif = jenis;
            ['SEMUA', 'Photocard', '2-Shot'].forEach(j => {
                const btn = document.getElementById(`btn-jns-${j}`);
                if(btn) {
                    if(j === jenis) {
                        btn.className = "px-4 py-2 rounded-lg text-sm font-bold bg-rose-600 text-white cursor-pointer transition";
                    } else {
                        btn.className = "px-4 py-2 rounded-lg text-sm font-semibold bg-slate-700 hover:bg-slate-600 text-slate-200 cursor-pointer transition";
                    }
                }
            });
            filterData();
        }

        // Handler perubahan filter tombol Lokasi Surabaya / Yogyakarta
        function setEventFilter(evt) {
            filterEventAktif = evt;
            
            // Daftar nilai evt asli yang akan dicocokkan
            const daftarEvent = ['SEMUA', 'LOVE & DREAM (SBY)', 'PASSION (YOGYA)'];
            
            daftarEvent.forEach(e => {
                // Trik aman: cari elemen menggunakan querySelector berdasarkan atribut onclick-nya
                // Cara ini jauh lebih aman daripada menggunakan getElementById jika teks mengandung simbol & ()
                const btn = document.querySelector(`button[onclick="setEventFilter('${e}')"]`);
                
                if (btn) {
                    if (e === evt) {
                        // Warna aktif jika dipilih
                        btn.className = "px-4 py-1.5 rounded-md text-xs font-bold bg-sky-600 text-white cursor-pointer transition";
                    } else {
                        // Warna redup jika tidak dipilih
                        btn.className = "px-4 py-1.5 rounded-md text-xs font-semibold bg-slate-700 hover:bg-slate-600 text-slate-300 cursor-pointer transition";
                    }
                }
            });
            
            // Jalankan penyaringan ulang data tabel
            filterData();
        }

        // Fungsi penyaringan gabungan (Multi-filter)
        function filterData() {
            const keyword = document.getElementById('searchFilter').value.toLowerCase();
            
            const hasilFilter = semuaMasterData.filter(item => {
                const cocokKeyword = item.nama.toLowerCase().includes(keyword) || item.sesi.toLowerCase().includes(keyword) || item.jalur.toLowerCase().includes(keyword);
                const cocokJenis = (filterJenisAktif === 'SEMUA') || (item.jenis === filterJenisAktif);
                const cocokEvent = (filterEventAktif === 'SEMUA') || (item.event === filterEventAktif);
                
                return cocokKeyword && cocokJenis && cocokEvent;
            });
            
            renderTabel(hasilFilter);
        }

        // Fungsi menyuntikkan manipulasi baris ke dalam HTML DOM Tabel
        function renderTabel(data) {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';

            if(data.length === 0) {
                tbody.innerHTML = `<tr><td colspan="7" class="p-8 text-center text-slate-500">Tidak ada tiket oshi atau benefit yang sesuai filter saat ini.</td></tr>`;
                return;
            }

            data.forEach(item => {
                let statusBadge = `<span class="px-2 py-1 text-xs font-bold rounded bg-green-500/20 text-green-400">Tersedia</span>`;
                let rowBg = "hover:bg-slate-700/30 transition";

                // Aturan penanda warna status dinamis berdasarkan sisa tiket
                if (item.sisa === 0) {
                    statusBadge = `<span class="px-2 py-1 text-xs font-bold rounded bg-rose-500/20 text-rose-400">SOLD OUT</span>`;
                    rowBg = "bg-rose-950/10 text-slate-500 hover:bg-rose-950/20";
                } else if (item.sisa <= 5) {
                    statusBadge = `<span class="px-2 py-1 text-xs font-bold rounded bg-amber-500/20 text-amber-400 animate-pulse">Menipis</span>`;
                    rowBg = "bg-amber-950/10 hover:bg-amber-950/20 text-amber-100";
                }

                // Bedakan warna badge kategori agar sedap dipandang mata
                const jenisBadge = item.jenis === 'Photocard' 
                    ? `<span class="px-2 py-0.5 rounded text-xs font-semibold bg-amber-500/10 text-amber-400 border border-amber-500/30">📸 Photocard</span>`
                    : `<span class="px-2 py-0.5 rounded text-xs font-semibold bg-purple-500/10 text-purple-400 border border-purple-500/30">🤝 2-Shot</span>`;

                tbody.innerHTML += `
                    <tr class="${rowBg}">
                        <td class="p-4 font-bold text-xs text-sky-400 uppercase tracking-wider">${item.event}</td>
                        <td class="p-4">${jenisBadge}</td>
                        <td class="p-4 font-medium text-slate-300 text-xs">${item.sesi}</td>
                        <td class="p-4 font-bold text-slate-100">${item.nama} <span class="block text-slate-400 font-normal text-xs mt-0.5">${item.jalur}</span></td>
                        <td class="p-4 text-center font-mono font-semibold text-slate-400">${item.terjual}</td>
                        <td class="p-4 text-center font-mono font-bold text-emerald-400 text-base">${item.sisa}</td>
                        <td class="p-4 text-center">${statusBadge}</td>
                    </tr>
                `;
            });
        }

        // Eksekusi pemanggilan otomatis saat halaman pertama kali dibuka
        window.onload = function() {
            bacaDataLokal();
            // Lakukan auto-refresh di browser klien setiap 15 detik demi hemat bandwidth internet
            setInterval(bacaDataLokal, 15000);
        };
    </script>
</body>
</html>
